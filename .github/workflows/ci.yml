name: CI Pipeline - Build & Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: cvregistryfranck.azurecr.io
          username: cvregistryfranck
          password: ${{ secrets.ACR_PASSWORD }}

      # 2. Exemple pour Build et Push l'API (à adapter selon la structure de ton fichier)
      - name: Build and push API
        run: |
          docker build -t cvregistryfranck.azurecr.io/api:${{ github.sha }} -t cvregistryfranck.azurecr.io/api:latest ./api
          docker push cvregistryfranck.azurecr.io/api:${{ github.sha }}
          docker push cvregistryfranck.azurecr.io/api:latest

