server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

   
   location /api/pdf {
        rewrite ^/api/pdf(/.*)$ $1 break;
        proxy_pass http://cv-pdf-service:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://cv-api-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
    }
}
